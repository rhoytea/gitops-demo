apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
  namespace: default
spec:
  replicas: 3  # était 2
  template:
    spec:
      containers:
      - name: demo-app
        image: nginx:1.22  # était 1.21
        env:
        - name: VERSION
          value: "v2.0"
---
apiVersion: v1
kind: Service
metadata:
  name: demo-app-svc
spec:
  selector:
    app: demo-app
  ports:
  - port: 80
  type: ClusterIP
